<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#f7f3ea" />
    <title>餐热量拍照记录</title>
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="hero-panel">
        <div>
          <p class="eyebrow">AI 食物热量助手</p>
          <h1>拍一张，记录一餐</h1>
        </div>
        <div class="score-ring" aria-label="今日摄入统计">
          <span id="todayCalories">0</span>
          <small>kcal 今日</small>
        </div>
      </section>

      <nav class="tabs" aria-label="主导航">
        <button class="tab is-active" data-tab="capture" type="button">拍照</button>
        <button class="tab" data-tab="history" type="button">历史</button>
        <button class="tab" data-tab="insights" type="button">分析</button>
        <button class="tab" data-tab="account" type="button">账号</button>
      </nav>

      <section class="view is-active" id="captureView">
        <div class="camera-stage">
          <img id="photoPreview" alt="食物照片预览" />
          <div class="empty-preview" id="emptyPreview">
            <span class="camera-icon" aria-hidden="true"></span>
            <strong>拍摄或上传食物照片</strong>
            <p>把镜头对准餐盘，结果会先让你确认再保存。</p>
          </div>
        </div>

        <div class="capture-actions">
          <label class="primary-action" for="photoInput">拍照 / 上传</label>
          <input id="photoInput" accept="image/*" capture="environment" type="file" />
          <button id="analyzeButton" class="secondary-action" disabled type="button">开始估算</button>
        </div>

        <form class="result-panel" id="mealForm" hidden>
          <div class="result-topline">
            <div>
              <p class="eyebrow">估算结果</p>
              <h2 id="estimateTitle">待确认</h2>
            </div>
            <div class="result-badges">
              <div class="source-pill" id="sourcePill">演示</div>
              <div class="confidence-pill" id="confidencePill">--</div>
            </div>
          </div>

          <label>
            食物名称
            <input id="foodName" autocomplete="off" required />
          </label>

          <div class="form-grid">
            <label>
              份量
              <input id="portion" inputmode="decimal" min="0.1" step="0.1" type="number" required />
            </label>
            <label>
              单位
              <select id="portionUnit">
                <option value="份">份</option>
                <option value="碗">碗</option>
                <option value="克">克</option>
                <option value="个">个</option>
              </select>
            </label>
          </div>

          <label>
            热量 kcal
            <input id="calories" inputmode="numeric" min="1" step="1" type="number" required />
          </label>

          <div class="component-section">
            <div class="toolbar compact">
              <h2>组成估算</h2>
              <button class="small-action" id="addComponentButton" type="button">添加</button>
            </div>
            <div class="component-list" id="componentList"></div>
          </div>

          <label>
            餐别
            <select id="mealType">
              <option value="早餐">早餐</option>
              <option value="午餐">午餐</option>
              <option value="晚餐">晚餐</option>
              <option value="零食">零食</option>
              <option value="宵夜">宵夜</option>
            </select>
          </label>

          <label>
            备注
            <textarea id="notes" rows="3" placeholder="例如：少油、半份、运动后"></textarea>
          </label>

          <div class="form-grid">
            <button class="secondary-action" id="cancelEditButton" hidden type="button">取消编辑</button>
            <button class="save-action" id="saveRecordButton" type="submit">保存为今日摄入</button>
          </div>
        </form>
        <div class="status-message" id="statusMessage" role="status" aria-live="polite" hidden></div>
      </section>

      <section class="view" id="historyView">
        <div class="toolbar">
          <h2>历史记录</h2>
          <button class="icon-button" id="exportButton" title="导出 JSON" type="button" aria-label="导出 JSON">
            <span class="download-icon" aria-hidden="true"></span>
          </button>
        </div>
        <div class="history-filters">
          <label>
            范围
            <select id="historyRange">
              <option value="7">近 7 天</option>
              <option value="30">近 30 天</option>
              <option value="90">近 90 天</option>
              <option value="all">全部</option>
            </select>
          </label>
          <label>
            搜索
            <input id="historySearch" autocomplete="off" placeholder="食物或备注" />
          </label>
        </div>
        <div class="history-list" id="historyList"></div>
      </section>

      <section class="view" id="insightsView">
        <div class="metrics-grid">
          <article>
            <span id="weekCalories">0</span>
            <small>本周 kcal</small>
          </article>
          <article>
            <span id="averageCalories">0</span>
            <small>日均 kcal</small>
          </article>
          <article>
            <span id="recordCount">0</span>
            <small>累计记录</small>
          </article>
        </div>

        <div class="chart-panel">
          <div class="toolbar">
            <h2>7 日趋势</h2>
            <button class="icon-button danger" id="clearButton" title="清空数据" type="button" aria-label="清空数据">
              <span class="trash-icon" aria-hidden="true"></span>
            </button>
          </div>
          <canvas id="trendChart" height="180"></canvas>
        </div>

        <div class="insight-card" id="insightText">保存几条记录后，这里会生成饮食趋势建议。</div>
      </section>

      <section class="view" id="accountView">
        <div class="account-panel">
          <div class="toolbar">
            <h2>账号与云端同步</h2>
            <span class="source-pill" id="cloudStatus">连接中</span>
          </div>

          <form class="auth-form" id="authForm">
            <label>
              邮箱
              <input id="authEmail" autocomplete="email" type="email" />
            </label>
            <label>
              密码
              <input id="authPassword" autocomplete="current-password" minlength="6" type="password" />
            </label>
            <div class="form-grid">
              <button class="secondary-action" id="signInButton" type="button">登录</button>
              <button class="save-action" id="signUpButton" type="button">注册</button>
            </div>
          </form>

          <div class="account-summary" id="accountSummary" hidden>
            <p id="accountEmail"></p>
            <div class="form-grid">
              <button class="secondary-action" id="syncLocalButton" type="button">同步本机历史</button>
              <button class="secondary-action" id="signOutButton" type="button">退出</button>
            </div>
          </div>
          <div class="status-message" id="accountStatusMessage" role="status" aria-live="polite" hidden></div>
        </div>
      </section>
    </main>

    <script src="./app.js" type="module"></script>
  </body>
</html>
